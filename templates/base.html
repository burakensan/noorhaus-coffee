{% load static %}
<!doctype html>
<html lang="de">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Noorhaus – Coffee{% endblock %}</title>
  <meta name="description" content="Noorhaus – Coffee. Specialty Coffee, Opening Hours, Menu, Drop by, Contact.">
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <script src="{% static 'js/main.js' %}" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="{% block body_class %}{% endblock %}"></body>

  <div class="bg-logo"></div>

  <header class="site-header">

    <button class="nav-toggle" aria-expanded="false" aria-controls="nav">Menu</button>

    <nav id="nav" class="site-nav">
      <a href="/#home" class="nav-link">Home</a>
      <a href="/#hours" class="nav-link">Opening Hours</a>
      <a href="/#menu" class="nav-link">Our Menu</a>
      <a href="/#dropby" class="nav-link">Drop By</a>
      <a href="/#contact" class="nav-link">Contact</a>
    </nav>

  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <a href="{% url 'impressum' %}">Impressum</a>
    <a href="{% url 'datenschutz' %}">Datenschutz</a>
  </footer>
</body>

</html>
